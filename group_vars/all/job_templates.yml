  - name: aap_drift_manager
    description: Detect and reconcile drift between Git CaaC and AAP
    project: drift_manager
    playbook: aap-drift-manager.yaml
    inventory: config_as_code
    execution_environment: aap-drift-manager-ee
    job_type: run
    concurrent_jobs_enabled: false
    ask_variables_on_launch: true
    webhook_service: "github"
    webhook_credential: "RQJeF5mwV3cZgpOeznkLH8jQdj98kuvNnYn12ROvvsHZQsOoG5"
    verbosity: 0
    credentials:
      - drift_manager_secrets
    extra_vars:
      # --- Run mode ---
      # drift_apply: false = dry-run (report only, no changes)
      # drift_apply: true  = apply changes (create / update / delete)
      # Override at launch time via the "Extra Variables" prompt.
      drift_apply: true
      drift_objects: ""

      # --- LLM / MaaS endpoint (non-sensitive) ---
      maas_api_base: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
      maas_model: "llama-scout-17b"

      # --- AAP Controller (non-sensitive) ---
      aap_mcp_server_url: "https://ec2-3-143-54-35.us-east-2.compute.amazonaws.com"
      aap_mcp_port: "443"
      aap_verify_ssl: "false"

      # --- Git CaaC repository ---
      git_repo_path: "https://github.com/kamlendu1982/caac-aap-2.5.git"
      git_branch: "main"

      # --- Guardrails ---
      no_delete_types: "credentials"
      protected_objects: "Default"

  - name: PS-long-running-waitfor-checkWinRM
    project: windows_usecases
    job_type: run
    playbook: PS-long-running-wait-for-checkWinRM.yaml
    #playbook: playbooks/sync_collections.yml
    inventory: windows
    execution_environment: "Control Plane Execution Environment"
    concurrent_jobs_enabled: false
    #limit: "{{ env }}"
    verbosity: 0
    credentials:
      - windows_password

  - name: PS-long-running-async-checkWinRM
    project: windows_usecases
    job_type: run
    playbook: PS-long-running-async-checkWinRM.yaml
    #playbook: playbooks/sync_collections.yml
    inventory: windows
    execution_environment: "Control Plane Execution Environment"
    concurrent_jobs_enabled: false
    #limit: "{{ env }}"
    verbosity: 0
    credentials:
      - windows_password

  - name: WindowsPowershell
    project: windows_usecases
    job_type: run
    playbook: execute_powershell_remote_git.yml
    #playbook: playbooks/sync_collections.yml
    inventory: windows
    execution_environment: "Default execution environment"
    concurrent_jobs_enabled: false
    #limit: "{{ env }}"
    verbosity: 0
    credentials:
      - windows_password

  - name: Deploy Splunk using Podman
    description: Deploy Splunk using Podman
    project: drift_manager
    playbook: playbooks/deploy_splunk.yml
    inventory: splunk_host
    execution_environment: "Default execution environment"
    job_type: run
    verbosity: 0
    credentials:
      - aws-ec2
    extra_vars:
      splunk_password: "ansible123"
      splunk_image: "splunk/splunk:latest"

  - name: Configure EDA Objects
    description: >-
      Create/update EDA credentials, project (Splunk-EDA-Project) and
      rulebook activation (splunk-action-caac) on the target AAP instance.
      Run this playbook when bootstrapping EDA on a new AAP or to re-apply
      the EDA configuration after a change in the CaaC repo.
    project: caac_aap_25
    playbook: playbooks/eda_config.yml
    inventory: config_as_code
    execution_environment: "Default execution environment"
    job_type: run
    verbosity: 0
    ask_inventory_on_launch: true
    extra_vars:
      aap_verify_ssl: "false"

  - name: Deploy CyberArk Conjur OSS
    description: >-
      Deploy CyberArk Conjur OSS on EC2 using Podman (conjur-quickstart).
      Creates admin account, lab secret (db_password), and systemd auto-start.
      On success, the job output and /opt/conjur/AAP_INTEGRATION.txt on the
      target host contain values for the AAP CyberArk Conjur Secrets Manager
      Lookup credential. See CONJUR_AAP_INTEGRATION.md in the repo.
    project: caac_aap_25
    playbook: playbooks/deploy_cyberArk_conjur.yml
    inventory: conjur_host
    execution_environment: "Default execution environment"
    job_type: run
    verbosity: 1
    ask_variables_on_launch: true
    credentials:
      - aws-ec2
    extra_vars:
      conjur_account: "myConjurAccount"
      conjur_admin_pass: "MySecretP@SS1"
      conjur_dir: "/opt/conjur"
      conjur_load_default_secret: true
      conjur_enable_systemd: true
      conjur_configure_client: true
      conjur_load_sample_policy: false
      conjur_start_demo_services: false
...
